server.port=8081

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=

mybatis.mapper-locations=classpath*:/mappers/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# ── 파일 업로드 ────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=55MB

# 업로드 저장 디렉토리 (운영 환경에 맞게 절대 경로로 변경)
app.upload.dir=${user.home}/careroute-uploads

# ── Google OAuth ────────────────────────────────────────────
# Google Cloud Console에서 발급한 OAuth 2.0 클라이언트 ID를 입력하세요.
# 비워두면 Google 로그인 버튼이 비활성화됩니다.
google.oauth.client-id=
